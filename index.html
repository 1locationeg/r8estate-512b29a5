<!doctype html>
<html lang="en">
  <head>

    <!-- Boot shell styles - renders instantly before JS -->
    <style>
      html, body { margin: 0; padding: 0; background: #0a3d62; min-height: 100vh; }
      #boot-shell {
        position: fixed; inset: 0; z-index: 9999;
        background: linear-gradient(135deg, #0a3d62 0%, #0d4f7e 100%);
        display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
        padding-top: env(safe-area-inset-top, 0px);
        font-family: 'Montserrat', system-ui, sans-serif;
        transition: opacity 0.4s ease-out;
        overflow-y: auto;
      }
      #boot-shell.fade-out { opacity: 0; pointer-events: none; }
      .boot-header {
        width: 100%; padding: 12px 16px;
        display: flex; align-items: center; justify-content: space-between;
      }
      .boot-brand { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
      .boot-brand .r8 { color: #ed1b40; }
      .boot-brand .estate { color: #fff; }
      .boot-hero {
        display: flex; flex-direction: column; align-items: center;
        width: 100%; max-width: 420px; padding: 0 16px; margin-top: 8px;
      }
      /* Gauge */
      .boot-gauge { width: 224px; height: 128px; position: relative; margin-bottom: 4px; }
      .boot-gauge svg { width: 100%; height: 100%; }
      .boot-score {
        position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
        font-size: 30px; font-weight: 900; color: hsl(142, 71%, 45%);
        font-variant-numeric: tabular-nums; line-height: 1;
      }
      .boot-label {
        font-size: 9px; font-weight: 900; letter-spacing: 0.25em;
        color: rgba(255,255,255,0.5); text-transform: uppercase; margin-bottom: 8px;
      }
      /* Review card */
      .boot-card {
        width: 100%; border-radius: 12px; padding: 12px;
        background: rgba(13,38,55,0.85); border: 1px solid rgba(255,255,255,0.12);
        box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      }
      .boot-card-header { text-align: center; margin-bottom: 6px; }
      .boot-card-header span {
        font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.9);
        display: inline-flex; align-items: center; gap: 6px;
      }
      .boot-card-header .pin-icon { width: 14px; height: 14px; color: #3b82f6; }
      .boot-reviewer { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
      .boot-avatar {
        width: 28px; height: 28px; border-radius: 50%;
        background: linear-gradient(135deg, #1877F2 0%, #3b82f6 100%);
        display: flex; align-items: center; justify-content: center;
        color: white; font-size: 13px; font-weight: 700; flex-shrink: 0;
      }
      .boot-reviewer-name { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.95); }
      .boot-verified {
        display: inline-block; width: 16px; height: 16px; vertical-align: middle; margin-left: 2px;
      }
      .boot-stars { display: inline-flex; gap: 1px; margin-left: 6px; }
      .boot-star { width: 12px; height: 12px; color: #f59e0b; fill: #f59e0b; }
      .boot-star-empty { width: 12px; height: 12px; color: rgba(255,255,255,0.15); fill: rgba(255,255,255,0.15); }
      .boot-time { font-size: 10px; color: rgba(255,255,255,0.4); margin-left: 6px; }
      .boot-quote {
        font-size: 12px; color: rgba(255,255,255,0.7); font-style: italic;
        line-height: 1.5; margin-bottom: 8px;
        display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
      }
      .boot-pills { display: flex; gap: 4px; flex-wrap: nowrap; margin-bottom: 8px; }
      .boot-pill {
        display: inline-flex; align-items: center; gap: 4px;
        padding: 3px 6px; border-radius: 8px; font-size: 10px; font-weight: 600;
        border: 1px solid;
      }
      .boot-pill-good { background: rgba(34,197,94,0.1); color: hsl(142,71%,45%); border-color: rgba(34,197,94,0.2); }
      .boot-pill-label { color: rgba(255,255,255,0.5); }
      .boot-pill-val { font-weight: 700; }
      .boot-footer {
        display: flex; align-items: center; justify-content: space-between;
        padding-top: 6px; border-top: 1px solid rgba(255,255,255,0.08);
      }
      .boot-dev { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.8); display: flex; align-items: center; gap: 6px; }
      .boot-dev-icon { width: 14px; height: 14px; color: rgba(255,255,255,0.4); }
      .boot-trust-badge {
        font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 999px;
        color: hsl(142,71%,45%); border: 1px solid hsl(142,71%,45%);
        background: rgba(34,197,94,0.08);
      }
      @keyframes bootPulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
      .boot-pulse { animation: bootPulse 2s ease-in-out infinite; }
    </style>
  </head>

  <body>
    <!-- Boot shell: visible instantly, removed after React mounts -->
    <div id="boot-shell">
      <div class="boot-header">
        <span class="boot-brand"><span class="r8">R8</span><span class="estate">ESTATE</span></span>
        <div style="display:flex;gap:6px;">
          <div style="width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.1);"></div>
        </div>
      </div>
      <div class="boot-hero">
        <!-- Gauge matching HeroTrustGauge -->
        <div class="boot-gauge">
          <svg viewBox="0 0 200 120" fill="none">
            <defs>
              <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="hsl(0,72%,51%)"/>
                <stop offset="16%" stop-color="hsl(20,80%,50%)"/>
                <stop offset="33%" stop-color="hsl(40,90%,50%)"/>
                <stop offset="50%" stop-color="hsl(48,96%,53%)"/>
                <stop offset="75%" stop-color="hsl(80,60%,45%)"/>
                <stop offset="100%" stop-color="hsl(142,71%,45%)"/>
              </linearGradient>
              <filter id="bGlow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
            </defs>
            <!-- Tick marks -->
            <line x1="24" y1="100" x2="20" y2="100" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
            <line x1="27" y1="73" x2="23" y2="71" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
            <line x1="42" y1="49" x2="38" y2="46" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
            <line x1="65" y1="30" x2="62" y2="27" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
            <line x1="100" y1="12" x2="100" y2="16" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
            <line x1="135" y1="30" x2="138" y2="27" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
            <line x1="158" y1="49" x2="162" y2="46" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
            <line x1="173" y1="73" x2="177" y2="71" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
            <line x1="176" y1="100" x2="180" y2="100" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
            <!-- Background arc -->
            <path d="M 10 100 A 90 90 0 0 1 190 100" stroke="rgba(255,255,255,0.08)" stroke-width="14" fill="none" stroke-linecap="round"/>
            <!-- Filled arc (88%) -->
            <path d="M 10 100 A 90 90 0 0 1 190 100" stroke="url(#bgGrad)" stroke-width="14" fill="none" stroke-linecap="round" stroke-dasharray="248 283" filter="url(#bGlow)"/>
            <!-- Needle at 88% position (angle ≈ 338.4° → cos/sin) -->
            <circle cx="160" cy="30" r="9" fill="#0d2137" stroke="hsl(142,71%,45%)" stroke-width="3"/>
            <polygon points="-4,5 4,5 0,-7" fill="hsl(142,71%,45%)" transform="translate(160,30) rotate(68)"/>
            <!-- Verified check -->
            <circle cx="160" cy="14" r="6" fill="hsl(142,71%,45%)"/>
            <polyline points="157.5,14 159.5,16 163,12" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <!-- Labels -->
            <text x="12" y="113" font-size="8" fill="rgba(255,255,255,0.4)" font-weight="600">0</text>
            <text x="182" y="113" font-size="8" fill="rgba(255,255,255,0.4)" font-weight="600">100</text>
            <text x="100" y="119" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.5)" font-weight="900" letter-spacing="0.25em">TRUST SCORE</text>
          </svg>
          <div class="boot-score boot-pulse">88</div>
        </div>

        <!-- Static review card (Mivida / score 88 scenario) -->
        <div class="boot-card">
          <div class="boot-card-header">
            <span>
              <svg class="pin-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
              Mivida · New Cairo
            </span>
          </div>
          <div class="boot-reviewer">
            <div class="boot-avatar">F</div>
            <div>
              <span class="boot-reviewer-name">Fatima Al-R.</span>
              <svg class="boot-verified" viewBox="0 0 24 24" fill="none">
                <path d="M12 2L14.09 4.26L17 3.29L17.47 6.29L20.39 7.1L19.42 10L21.68 12L19.42 14L20.39 16.9L17.47 17.71L17 20.71L14.09 19.74L12 22L9.91 19.74L7 20.71L6.53 17.71L3.61 16.9L4.58 14L2.32 12L4.58 10L3.61 7.1L6.53 6.29L7 3.29L9.91 4.26L12 2Z" fill="#1877F2"/>
                <path d="M9.5 12.5L11 14L15 10" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <span class="boot-stars">
                <svg class="boot-star" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                <svg class="boot-star" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                <svg class="boot-star" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                <svg class="boot-star" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                <svg class="boot-star-empty" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              </span>
              <span class="boot-time">2 weeks ago</span>
            </div>
          </div>
          <div class="boot-quote">"Excellent compound, green spaces everywhere. Delivered on schedule with premium finishing. Community life is wonderful."</div>
          <div class="boot-pills">
            <span class="boot-pill boot-pill-good">
              <span class="boot-pill-label">Delivery</span>
              <span class="boot-pill-val">On time</span>
            </span>
            <span class="boot-pill boot-pill-good">
              <span class="boot-pill-label">Build quality</span>
              <span class="boot-pill-val">Excellent</span>
            </span>
            <span class="boot-pill boot-pill-good">
              <span class="boot-pill-label">Response</span>
              <span class="boot-pill-val">Fast</span>
            </span>
          </div>
          <div class="boot-footer">
            <span class="boot-dev">
              <svg class="boot-dev-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01M16 6h.01M12 6h.01M8 10h.01M16 10h.01M12 10h.01M8 14h.01M16 14h.01M12 14h.01"/></svg>
              Emaar Misr
            </span>
            <span class="boot-trust-badge">High Trust · 88</span>
          </div>
        </div>
      </div>
    </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
