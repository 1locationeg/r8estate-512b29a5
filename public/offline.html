<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>R8ESTATE – Offline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Montserrat', system-ui, sans-serif;
      background: linear-gradient(135deg, #0a3d62 0%, #0d4f7e 100%);
      color: #e8f0f7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    /* Logo */
    .logo-row {
      display: flex;
      align-items: center;
      gap: 2px;
      margin-bottom: 8px;
      animation: fadeUp .6s ease-out both;
    }
    .logo-icon { height: 48px; width: 48px; object-fit: contain; margin-right: -4px; filter: brightness(0) invert(1) drop-shadow(0 0 6px rgba(255,255,255,0.3)); }
    .logo-text { font-size: 1.35rem; font-weight: 800; line-height: 1; letter-spacing: -0.5px; }
    .logo-r8 { color: #e63946; }
    .logo-estate { color: #fff; }
    .logo-tagline {
      font-size: 7px; color: rgba(255,255,255,0.55);
      letter-spacing: 0.5px; margin-top: 1px;
    }

    /* Tagline */
    .hero-tagline {
      text-align: center;
      max-width: 340px;
      margin-bottom: 28px;
    }
    .tagline-l1 {
      font-size: 1.25rem;
      font-weight: 900;
      background: linear-gradient(135deg, #fff 0%, #e63946 50%, #f0a500 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
      animation: fadeUp .7s .15s ease-out both;
    }
    .tagline-l2 {
      font-size: 1.05rem;
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      line-height: 1.3;
      animation: fadeUp .6s .35s ease-out both;
    }

    /* Offline notice */
    .offline-card {
      text-align: center;
      max-width: 340px;
      animation: fadeUp .5s .5s ease-out both;
      margin-bottom: 32px;
    }
    .wifi-icon {
      width: 48px; height: 48px; margin: 0 auto 16px;
      opacity: .7;
    }
    .wifi-icon svg { width: 100%; height: 100%; }
    .offline-card h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
    .offline-card p { font-size: .85rem; opacity: .6; line-height: 1.5; margin-bottom: 20px; }
    .retry-btn {
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.2);
      color: #fff;
      font: 600 .8rem/1 'Montserrat', sans-serif;
      padding: 10px 24px;
      border-radius: 999px;
      cursor: pointer;
      transition: background .2s;
      backdrop-filter: blur(8px);
    }
    .retry-btn:hover { background: rgba(255,255,255,.18); }

    /* Stats */
    .stats-row {
      display: flex;
      gap: 0;
      max-width: 380px;
      width: 100%;
      animation: fadeUp .5s .7s ease-out both;
    }
    .stat {
      flex: 1;
      text-align: center;
      padding: 12px 4px;
      position: relative;
    }
    .stat + .stat::before {
      content: '';
      position: absolute;
      left: 0;
      top: 20%;
      height: 60%;
      width: 1px;
      background: rgba(255,255,255,.12);
    }
    .stat-num {
      font-size: 1.15rem;
      font-weight: 900;
      color: #f0a500;
      line-height: 1.1;
    }
    .stat-label {
      font-size: .55rem;
      color: rgba(255,255,255,.45);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-top: 3px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <!-- Logo -->
  <div class="logo-row">
    <img src="/logo-icon.png" alt="" class="logo-icon" />
    <div>
      <div class="logo-text"><span class="logo-r8">R8</span><span class="logo-estate">ESTATE</span></div>
      <div class="logo-tagline">Real Reviews · Real Estate</div>
    </div>
  </div>

  <!-- Tagline -->
  <div class="hero-tagline">
    <div class="tagline-l1">Who's taking your millions</div>
    <div class="tagline-l2">to give you a home?</div>
  </div>

  <!-- Offline notice -->
  <div class="offline-card">
    <div class="wifi-icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 010 12.728M15.536 8.464a5 5 0 010 7.072M2 12h.01M6 12a6 6 0 0112 0" />
        <line x1="3" y1="3" x2="21" y2="21" stroke-linecap="round"/>
      </svg>
    </div>
    <h2>You're Offline</h2>
    <p>We'll be back as soon as you reconnect.</p>
    <button class="retry-btn" onclick="location.reload()">Try Again</button>
  </div>

  <!-- Social proof stats -->
  <div class="stats-row">
    <div class="stat">
      <div class="stat-num">50K+</div>
      <div class="stat-label">Reviews</div>
    </div>
    <div class="stat">
      <div class="stat-num">1,200+</div>
      <div class="stat-label">Companies</div>
    </div>
    <div class="stat">
      <div class="stat-num">100K+</div>
      <div class="stat-label">Users</div>
    </div>
    <div class="stat">
      <div class="stat-num">96%</div>
      <div class="stat-label">Success</div>
    </div>
  </div>
</body>
</html>
