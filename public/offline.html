<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>R8ESTATE – Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Montserrat', 'DM Sans', system-ui, sans-serif;
      background: linear-gradient(135deg, #0a3d62 0%, #0d4f7e 100%);
      color: #e8f0f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      text-align: center;
      max-width: 380px;
      animation: fadeUp .5s ease-out both;
    }
    .icon {
      width: 72px; height: 72px; margin: 0 auto 24px;
      opacity: .85;
    }
    .icon svg { width: 100%; height: 100%; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 12px; }
    p { font-size: .95rem; opacity: .75; line-height: 1.6; margin-bottom: 28px; }
    button {
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.25);
      color: #fff;
      font: 600 .85rem/1 'Montserrat', sans-serif;
      padding: 12px 28px;
      border-radius: 999px;
      cursor: pointer;
      transition: background .2s;
      backdrop-filter: blur(8px);
    }
    button:hover { background: rgba(255,255,255,.2); }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 010 12.728M15.536 8.464a5 5 0 010 7.072M2 12h.01M6 12a6 6 0 0112 0" />
        <line x1="3" y1="3" x2="21" y2="21" stroke-linecap="round"/>
      </svg>
    </div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. R8ESTATE will be back as soon as you reconnect.</p>
    <button onclick="location.reload()">Try Again</button>
  </div>
</body>
</html>
